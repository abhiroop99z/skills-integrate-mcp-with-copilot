<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="header-actions">
        <button id="admin-toggle" class="icon-button" type="button" aria-label="Teacher tools">
          👤
        </button>
        <div id="auth-panel" class="auth-panel hidden">
          <p id="auth-status">Students can browse registrations.</p>
          <button id="open-login" type="button">Teacher Login</button>
          <button id="logout-button" class="hidden" type="button">Logout</button>
        </div>
      </div>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Register a Student</h3>
        <p id="signup-help" class="info-banner">
          Teacher login is required to register or remove students from activities.
        </p>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <div id="login-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Teacher Login</h3>
          <button id="close-login" class="icon-button close-button" type="button" aria-label="Close login dialog">
            ✕
          </button>
        </div>
        <form id="login-form">
          <div class="form-group">
            <label for="teacher-username">Username:</label>
            <input type="text" id="teacher-username" required placeholder="Enter teacher username" />
          </div>
          <div class="form-group">
            <label for="teacher-password">Password:</label>
            <input type="password" id="teacher-password" required placeholder="Enter teacher password" />
          </div>
          <button type="submit">Login</button>
        </form>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
